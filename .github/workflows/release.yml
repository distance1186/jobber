name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ── Job 1: Build Go binaries + Linux packages + Docker image ──
  build-linux:
    name: Build (Linux + Docker)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: cli/go.sum

      - name: Build Go binaries
        working-directory: cli
        run: |
          mkdir -p ../dist/linux ../dist/windows

          echo "==> Building linux/amd64"
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ../dist/linux/jobber-setup .

          echo "==> Building windows/amd64"
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ../dist/windows/jobber-setup.exe .

          ls -lh ../dist/linux/ ../dist/windows/

      - name: Upload Go binaries
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: |
            dist/linux/jobber-setup
            dist/windows/jobber-setup.exe

      # ── Docker: Agent image ────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: agent
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/agent:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/agent:latest

      # ── Linux .deb package ─────────────────────────
      - name: Build .deb package
        run: |
          chmod +x packaging/build-deb.sh
          ./packaging/build-deb.sh \
            "${{ steps.version.outputs.version }}" \
            "dist/linux/jobber-setup"

      # ── Linux .tar.gz archive ──────────────────────
      - name: Build .tar.gz archive
        run: |
          chmod +x packaging/build-tarball.sh scripts/install-deps.sh
          ./packaging/build-tarball.sh \
            "${{ steps.version.outputs.version }}" \
            "dist/linux/jobber-setup"

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            packaging/build/jobber_${{ steps.version.outputs.version }}_amd64.deb
            packaging/build/jobber-${{ steps.version.outputs.version }}-linux-amd64.tar.gz

  # ── Job 2: Build Windows installer (needs Windows runner) ──
  build-windows:
    name: Build (Windows Installer)
    runs-on: windows-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4

      - name: Download Go binaries
        uses: actions/download-artifact@v4
        with:
          name: go-binaries
          path: dist

      - name: Compile Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/windows/jobber.iss
          options: /DMyAppVersion=${{ needs.build-linux.outputs.version }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/windows/Output/jobber-setup-windows-amd64.exe

  # ── Job 3: Create GitHub Release with all artifacts ──
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: artifacts

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
