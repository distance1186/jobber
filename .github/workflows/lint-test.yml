name: Lint & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python-agent:
    name: Python Agent (lint + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: jobtracker
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: jobtracking
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jobtracker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agent/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r agent/requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          flake8 agent/ --max-line-length=120 --exclude=agent/tests

      - name: Initialize database
        env:
          PGPASSWORD: testpass
        run: |
          psql -h localhost -U jobtracker -d jobtracking -f db/init.sql

      - name: Run tests
        env:
          DATABASE_URL: postgresql://jobtracker:testpass@localhost:5432/jobtracking
          OLLAMA_BASE_URL: http://localhost:11434
          OLLAMA_MODEL: test-model
        run: |
          pytest agent/tests/ -v

  go-cli:
    name: Go CLI (vet + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: cli/go.sum

      - name: Go vet
        working-directory: cli
        run: go vet ./...

      - name: Build (Linux)
        working-directory: cli
        run: |
          GOOS=linux GOARCH=amd64 go build -o /dev/null .

      - name: Build (Windows)
        working-directory: cli
        run: |
          GOOS=windows GOARCH=amd64 go build -o /dev/null .
